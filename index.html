<!DOCTYPE html>

<body class="dark_mode">
    <!-- Header opções -->

    <header class="header-sticky">
        <nav class="navbar navbar-expand-md">
            <div class="container-fluid px-5 fundo_background">
                
                <a class="navbar-brand d-flex align-items-center" href="#">
                    <span class="logo-text">LyJogos</span>
                </a>

                <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse justify-content-end" id="navbarSupportedContent">
                    <ul class="navbar-nav gap-4">
                        <li class="nav-item">
                            <a class="nav-link" href="#">Categorias</a>
                        </li>
                        <li class="nav-item sumir">
                            <a class="nav-link" href="#">Descontos</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Noticias</a>
                        </li>
                        <li class="nav-item sumir">

                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Lista de desejos</a>
                        </li>
                    </ul>


                    <div class="ms-4">
                        <img src="img/logo/icone_lightmode.png" alt="Alternar modo" class="mode_img"

                    </div>
                </div>
            </div>

        <article class="container text-center">
            <aside class="row container-grid mt-5">

                    <h1>Respire fundo. O salto dói MENOS que ficar PARADO. Baixe Celeste AGORA e CONQUISTE o topo!
                        <br>
                        <img src="img/Celeste/logo_celeste.png" alt="Logo Celeste" class="logo_celeste">

                            <h2>Compre já</h2>
                        </button>
                    </h1>

                </div>
                <div class="col">
                    <img src="img/Celeste/madeline_celeste.png" alt="Madeline Celeste" class="madeline">
                </div>

            </aside>
        </article>

        <!-- Descontos -->


       

            <h1 class="text-center mt-5">Descontos</h1>
          
                <article class="container-sm">

                                <div class="card-body px-0">
                                    <h3 class="card-title">Resident Evil 4</h3>
                                    <h4 class="fw-bold mb-0">R$ 67,60 </h4>

                                </div>

                                <div class="card-body px-0">
                                    <h3 class="card-title">Persona 3 Reload</h3>
                                    <h4 class="fw-bold mb-0">R$ 99,96</h4>

                                    </button>

                                </div>

                                    alt="Tênis Nike">
                                <div class="card-body px-0">
                                    <h3 class="card-title">The Last of Us™ Parte II</h3>
                                    <h4 class="fw-bold mb-0">R$ 79,98</h4>
                                    <button type="button" class="btn btn-success">Comprar</button>
                                    <button type="button" class="btn btn-info">Adicionar ao carrinho
                                    </button>

                                </div>
                            </div>
                        </aside>


                        <aside class="col-md-6 col-lg-3 mb-4">
                            <div class="card h-200 border-1 shadow-sm p-3">

                                <div class="card-body px-0">
                                    <h3 class="card-title">CupHead</h3>

                                    <button type="button" class="btn btn-info">Adicionar ao carrinho
